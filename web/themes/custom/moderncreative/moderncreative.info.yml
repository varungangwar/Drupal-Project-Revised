name: moderncreative
type: theme
description: My custom Drupal theme
core_version_requirement: ^10 || ^11
base theme: false
libraries:
  - portfoliolite/global
  - moderncreative/global-styles
  - portfoliolite/google-font
  - portfoliolite/fontawesome
 
regions:
  header: 'Header'
  primary_menu: 'Primary Menu'
  hero: 'Hero Section'
  about: 'About Section'
  skills: 'Skills Section'
  stats: 'Stats Section'
  testimonials: 'Testimonials Section'
  blog: 'Blog Section'
  contact: 'Contact Section'
  footer_first: 'Footer First'
  footer_second: 'Footer Second'
  footer: 'Footer Bottom'
components:
  namespaces:
    moderncreative: components